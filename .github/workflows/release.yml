name: Deploy AgentAuth Skill

on:
  push:
    tags:
      - 'agentauth-skill@*'

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.extract_version.outputs.version }}
      tag: ${{ steps.extract_tag.outputs.tag }}

    steps:
      - name: Extract tag
        id: extract_tag
        run: echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Validate tag and extract version
        id: extract_version
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [[ ! "$TAG" =~ ^agentauth-skill@([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Invalid tag: $TAG"
            exit 1
          fi

          VERSION="${BASH_REMATCH[1]}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.extract_tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: skills/agentauth
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: skills/agentauth
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentauth-build
          path: skills/agentauth/scripts/
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: production

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: agentauth-build
          path: .

      - name: Deploy to Clawhub
        working-directory: skills/agentauth
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          echo "Deploying version $VERSION"

          npx clawhub login --token "$CLAWHUB_TOKEN"

          npm run prepare:clawhub

          npx clawhub skill publish ./agentauth \
            --slug agentauth \
            --name "agentauth" \
            --version "$VERSION" \
            --tags latest \
            --workdir .
