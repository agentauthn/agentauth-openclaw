name: Deploy AgentAuth Skill

on:
  push:
    tags:
      - 'agentauth-skill@*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.extract_version.outputs.version }}
      tag: ${{ steps.extract_tag.outputs.tag }}

    steps:
      - name: Extract tag
        id: extract_tag
        run: echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Validate tag and extract version
        id: extract_version
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [[ ! "$TAG" =~ ^agentauth-skill@([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Invalid tag: $TAG"
            exit 1
          fi

          VERSION="${BASH_REMATCH[1]}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.extract_tag.outputs.tag }}

  release:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.test.outputs.tag }}
          name: AgentAuth Skill v${{ needs.test.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: [test, release]

    environment:
      name: production

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.test.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: skills/agentauth
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: skills/agentauth
        run: npm run build

      - name: Deploy to Clawhub
        working-directory: skills/agentauth
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          VERSION: ${{ needs.test.outputs.version }}
        run: |
          echo "Deploying version $VERSION"

          npx clawhub login --token "$CLAWHUB_TOKEN"

          npm run prepare:clawhub

          CLAWSCAN_NOTE="$(tr '\n' ' ' < ./docs/clawscan-note.txt)"

          npx clawhub skill publish ./agentauth \
            --slug agentauth \
            --name "agentauth" \
            --version "$VERSION" \
            --tags latest \
            --clawscan-note "$CLAWSCAN_NOTE" \
            --workdir .
